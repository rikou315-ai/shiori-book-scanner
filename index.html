<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#f6f7f2" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="apple-touch-icon" href="icon.svg" />
  <title>しおり — 本を、あとから読める形に。</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="crop.css" />
</head>
<body>
  <main class="app-shell">
    <section id="library" class="screen active" aria-label="ライブラリ">
      <header class="topbar">
        <div><p class="eyebrow">MY SHELF</p><h1>しおり</h1></div>
        <button class="avatar" aria-label="プロフィール">木</button>
      </header>
      <div class="search"><span>⌕</span><input id="search" type="search" placeholder="保存したページを検索" /></div>
      <div class="section-row"><h2>最近の保存</h2><button id="filterBtn" class="text-button">すべて</button></div>
      <div id="cards" class="cards"></div>
      <div class="empty-state" id="emptyState" hidden><div>⌑</div><h2>最初の1ページを保存しよう</h2><p>本のページを撮ると、読みやすく整えて<br>あとから見つけられるようにします。</p></div>
      <button class="scan-fab" id="openScanner" aria-label="ページを撮影"><span>＋</span><small>スキャン</small></button>
      <nav class="tabbar"><button class="selected">▣<span>ライブラリ</span></button><button id="newTab">⌕<span>検索</span></button><button id="collectionTab">◇<span>コレクション</span></button></nav>
    </section>

    <section id="scanner" class="screen scanner-screen" aria-label="スキャン">
      <header class="scan-header"><button class="icon-button close">×</button><strong>ページを取り込む</strong><button id="importButton" class="text-button light">写真を選ぶ</button></header>
      <div class="camera-preview" id="previewArea">
        <input id="cameraInput" type="file" accept="image/*" capture="environment" hidden />
        <div class="page-frame"><i></i><i></i><i></i><i></i><div class="scan-line"></div></div>
        <div class="camera-hint"><b>ページを枠に合わせてください</b><span>端を自動で検出・補正します</span></div>
      </div>
      <div class="scan-actions"><button class="flash">☼<span>自動</span></button><button id="shutter" class="shutter" aria-label="撮影"></button><button class="flash">▧<span>複数</span></button></div>
    </section>

    <section id="editor" class="screen editor-screen" aria-label="編集">
      <header class="scan-header"><button class="icon-button close">‹</button><strong>ページを整える</strong><button id="savePage" class="save">保存</button></header>
      <div class="editor-stage"><canvas id="pageCanvas"></canvas><div id="drawingLayer"></div></div>
      <div class="auto-note" id="autoNote">✦ 余白を整え、文字をくっきり補正しました</div>
      <div class="tools">
        <button data-tool="crop" class="tool"><span>⌗</span>切り抜き</button>
        <button data-tool="original" class="tool selected"><span>◐</span>オリジナル</button>
        <button data-tool="enhance" class="tool"><span>☼</span>くっきり</button>
        <button data-tool="mono" class="tool"><span>◑</span>白黒</button>
        <button data-tool="magic" class="tool"><span>✦</span>マジック</button>
      </div>
      <div id="cropPanel" class="crop-panel" hidden><div><b>四隅を本の角に合わせる</b><p>台形の写真を、まっすぐなページに補正します。</p></div><button id="applyCrop">補正する</button></div>
      <div id="magicPanel" class="magic-panel" hidden><div><b>マジックで隠す</b><p>隠したい部分を指でなぞってください。</p></div><button id="clearMarks">やり直す</button></div>
    </section>

    <section id="details" class="screen detail-screen" aria-label="保存内容">
      <header class="detail-header"><button class="icon-button close">‹</button><span id="detailCount">1 / 1</span><button class="icon-button">•••</button></header>
      <img id="detailImage" alt="保存した本のページ" />
      <div class="detail-meta"><div><p class="eyebrow">SAVED PAGE</p><h2 id="detailTitle">無題のページ</h2><p id="detailDate"></p></div><button class="round-button">＋</button></div>
      <div class="excerpt" id="excerpt">テキストを読み取り中です…</div>
      <div class="tags"><span>#あとで読む</span><span>#読書メモ</span><button>＋ タグ</button></div>
    </section>
  </main>
  <template id="cardTemplate"><article class="card"><img /><div class="card-copy"><p class="eyebrow">SAVED PAGE</p><h3></h3><p class="date"></p><div class="card-tags"><span>#あとで読む</span><span>#読書メモ</span></div></div></article></template>
  <script src="app.js"></script>
</body>
</html>
